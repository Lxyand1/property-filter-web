name: Update real estate knowledge

on:
  schedule:
    # 23:00 UTC = 07:00 Asia/Shanghai
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-knowledge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update knowledge files
        run: node scripts/update-real-estate-knowledge.mjs

      - name: Commit and push changes
        run: |
          if git diff --quiet -- data/real-estate-knowledge.json data/real-estate-sources.json; then
            echo "No knowledge changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/real-estate-knowledge.json data/real-estate-sources.json
          git commit -m "Update real estate knowledge"
          git push origin HEAD:main
          git push origin HEAD:gh-pages
