
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小邱房源筛选页</title>
  <style>
    :root {
      --bg: #FAFAFA;
      --fg: #111111;
      --surface: #FFFFFF;
      --muted: #6B6B6B;
      --border: #E5E5E5;
      --accent: #2F6FEB;
      --success: #17A34A;
      --warn: #EAB308;
      --danger: #DC2626;
      --shadow: 0 2px 8px rgba(17, 17, 17, 0.08);
      --font-display: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      line-height: 1.5;
    }

    button,
    select,
    textarea {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      padding: 20px 24px 32px;
    }

    .shell {
      width: min(1440px, 100%);
      margin: 0 auto;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(360px, 420px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .control-panel {
      position: sticky;
      top: 16px;
      display: grid;
      gap: 16px;
      max-height: calc(100vh - 32px);
      overflow: auto;
      padding-right: 2px;
    }

    .results-panel {
      min-width: 0;
      padding: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      gap: 16px;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 16px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-family: var(--font-display);
      font-size: clamp(32px, 6vw, 64px);
      line-height: 1.08;
      letter-spacing: -0.01em;
      font-weight: 600;
      text-wrap: pretty;
    }

    .lead {
      margin: 20px 0 0;
      max-width: 640px;
      color: var(--muted);
      font-size: 20px;
    }

    .advisor-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    .advisor-top {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      color: #FFFFFF;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 700;
    }

    .advisor-card h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .advisor-card p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .ai-assistant {
      min-height: 0;
      background:
        radial-gradient(circle at 12% 8%, rgba(47, 111, 235, 0.16), transparent 32%),
        linear-gradient(135deg, #FFFFFF 0%, #F5F7FB 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .ai-header {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
    }

    .ai-avatar {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), #6C5CE7);
      color: #FFFFFF;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(47, 111, 235, 0.24);
    }

    .ai-header h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1.1;
    }

    .ai-header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .ai-messages {
      display: grid;
      gap: 12px;
      align-content: start;
      min-height: 150px;
      max-height: 260px;
      overflow: auto;
      padding: 18px 20px;
    }

    .ai-message {
      width: fit-content;
      max-width: min(92%, 620px);
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
    }

    .ai-message.assistant {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--fg);
    }

    .ai-message.user {
      justify-self: end;
      background: var(--accent);
      color: #FFFFFF;
    }

    .ai-form {
      display: grid;
      gap: 10px;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.82);
    }

    .ai-input {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: var(--surface);
      color: var(--fg);
      outline: none;
    }

    .ai-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 111, 235, 0.12);
    }

    .ai-quick {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quick-prompt {
      min-height: 32px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
    }

    .quick-prompt:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .ai-submit-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }

    .ai-hint {
      margin-right: auto;
      color: var(--muted);
      font-size: 12px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      background: var(--bg);
    }

    .metric strong {
      display: block;
      font-family: var(--font-mono);
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      padding: 16px;
      background: rgba(250, 250, 250, 0.96);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--fg);
      padding: 10px 12px;
      outline: none;
    }

    .select:focus {
      border-color: var(--accent);
    }

    .surroundings {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding-top: 4px;
    }

    .chip {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      cursor: pointer;
      user-select: none;
    }

    .chip input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .chip:has(input:checked) {
      border-color: var(--accent);
      background: rgba(47, 111, 235, 0.08);
      color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .button {
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      background: transparent;
      color: var(--fg);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .button:hover {
      background: var(--surface);
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #FFFFFF;
    }

    .result-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin: 0 0 16px;
    }

    .result-head h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .result-count {
      color: var(--muted);
      font-size: 14px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      display: grid;
      gap: 16px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      color: inherit;
      transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .community {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .meta {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .area {
      flex: 0 0 auto;
      color: var(--accent);
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .facts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .fact {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
    }

    .fact span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .fact strong {
      display: block;
      margin-top: 2px;
      font-size: 14px;
      font-weight: 600;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(47, 111, 235, 0.08);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .open-link {
      color: var(--accent);
      font-weight: 600;
    }

    .empty {
      display: none;
      padding: 32px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 12px;
      text-align: center;
    }

    .empty strong {
      display: block;
      margin-bottom: 8px;
      font-size: 20px;
    }

    .empty p {
      margin: 0;
      color: var(--muted);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(17, 17, 17, 0.42);
    }

    .modal-backdrop.open {
      display: grid;
    }

    .modal {
      width: min(560px, 100%);
      background: var(--surface);
      border-radius: 12px;
      box-shadow: 0 18px 50px rgba(17, 17, 17, 0.22);
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .modal-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .close {
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      color: var(--fg);
      font-size: 22px;
      line-height: 1;
    }

    .modal-body {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .video-box {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      word-break: break-all;
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: 14px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 80;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--fg);
      color: #FFFFFF;
      box-shadow: var(--shadow);
      transition: opacity 160ms ease, transform 160ms ease;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }


    .mobile-tabs {
      display: none;
    }

    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .control-panel {
        position: static;
        max-height: none;
        overflow: visible;
      }

      .hero {
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      }

      .filters {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 1023px) {
      .page {
        padding: 24px 16px 40px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 639px) {
      .page {
        padding: 16px 12px 32px;
      }

      .mobile-tabs {
        position: sticky;
        top: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        padding: 8px;
        margin-bottom: 12px;
        background: rgba(244, 247, 252, 0.94);
        border: 1px solid var(--border);
        border-radius: 999px;
        backdrop-filter: blur(12px);
      }

      .mobile-tab {
        min-height: 42px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-weight: 700;
      }

      .mobile-tab.active {
        background: var(--accent);
        color: #FFFFFF;
        box-shadow: 0 10px 20px rgba(47, 111, 235, 0.18);
      }

      .control-panel {
        display: contents;
      }

      [data-mobile-hide="true"] {
        display: none !important;
      }

      body.mobile-view-ai [data-mobile-view="filter"],
      body.mobile-view-filter [data-mobile-view="ai"] {
        display: none !important;
      }

      body.mobile-view-ai .workspace,
      body.mobile-view-filter .workspace {
        display: block;
      }

      .ai-assistant,
      .toolbar,
      .results-panel {
        margin-bottom: 14px;
      }

      .results-panel {
        padding: 14px;
        border-radius: 14px;
      }

      body.mobile-view-ai .ai-assistant {
        min-height: calc(100vh - 104px);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      body.mobile-view-ai .ai-messages {
        min-height: 0;
        max-height: none;
        height: 100%;
      }

      body.mobile-view-ai .ai-form {
        position: sticky;
        bottom: 0;
        z-index: 20;
        margin: 0 -2px -2px;
        padding-top: 10px;
        background: linear-gradient(180deg, rgba(255,255,255,0), var(--surface) 28%);
      }

      body.mobile-view-ai .ai-hint {
        display: none;
      }

      body.mobile-view-ai .ai-submit-row {
        justify-content: flex-end;
      }

      .lead {
        font-size: 16px;
      }

      .summary-grid,
      .filters,
      .cards,
      .facts {
        grid-template-columns: 1fr;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .actions,
      .result-head {
        align-items: stretch;
        flex-direction: column;
      }

      .button {
        width: 100%;
      }

      .card-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <div class="workspace">
        <nav class="mobile-tabs" aria-label="&#25163;&#26426;&#31471;&#39029;&#38754;&#20999;&#25442;">
          <button class="mobile-tab active" type="button" data-mobile-tab="ai">AI&#25214;&#25151;</button>
          <button class="mobile-tab" type="button" data-mobile-tab="filter">&#25163;&#21160;&#31579;&#36873;</button>
        </nav>

        <aside class="control-panel">
          <section class="ai-assistant" data-mobile-view="ai" aria-labelledby="page-title">

              <div>

          <section class="advisor-card compact-summary" data-mobile-hide="true" aria-label="&#25151;&#28304;&#27010;&#35272;">

              <div class="avatar">&#37041;</div>
              <div>
                <h2>&#25151;&#28304;&#27010;&#35272;</h2>
                <p>&#24403;&#21069;&#25972;&#29702;&#20102; 5 &#22871;&#21487;&#37325;&#28857;&#20102;&#35299;&#30340;&#25151;&#28304;&#12290;</p>

            </div>
            <div class="summary-grid">

              <div class="metric"><strong id="avgArea">&#8212;</strong><span>&#24179;&#22343;&#38754;&#31215;</span></div>
              <div class="metric"><strong id="mainFit">&#8212;</strong><span>&#24120;&#35265;&#25143;&#22411;</span></div>
            </div>
          </section>

          <section class="toolbar" data-mobile-view="filter" aria-label="&#31579;&#36873;&#26465;&#20214;">
            <div class="filters">
              <div class="field">
                <label for="community">&#23567;&#21306;&#20559;&#22909;</label>
                <select class="select" id="community">
                  <option value="">&#19981;&#22266;&#23450;</option>
                  <option value="&#19975;&#28304;&#22478;&#24481;&#29828;">&#19975;&#28304;&#22478;&#24481;&#29828;</option>
                  <option value="&#26032;&#26102;&#20195;&#26223;&#24237;">&#26032;&#26102;&#20195;&#26223;&#24237;</option>
                  <option value="&#19978;&#28023;&#33457;&#22253;&#27915;&#25151;">&#19978;&#28023;&#33457;&#22253;&#27915;&#25151;</option>
                  <option value="&#38451;&#20809;&#32654;&#26223;&#22478;">&#38451;&#20809;&#32654;&#26223;&#22478;</option>
                  <option value="&#19975;&#28304;&#22478;&#26391;&#37089;">&#19975;&#28304;&#22478;&#26391;&#37089;</option>
                </select>
              </div>

              <div class="field">
                <label for="rooms">&#25151;&#38388;&#25968;</label>
                <select class="select" id="rooms">
                  <option value="">&#19981;&#38480;</option>
                  <option value="2">2 &#25151;</option>
                  <option value="3">3 &#25151;</option>

      const safe = filters || {};

        community: safe.community || "",
        rooms: safe.rooms ? String(safe.rooms) : "",

        yearRange: safe.yearRange || "",
        surroundings: Array.isArray(safe.surroundings) ? safe.surroundings : []
      };
    }

      const normalized = normalizeFilters(filters);
      setSelectValue(els.community, normalized.community);
      setSelectValue(els.rooms, normalized.rooms);

      els.surroundingChecks.forEach((input) => {
        input.checked = normalized.surroundings.includes(input.value);
      });
      applyFilters();

    const aiConfigKeys = {
      apiKey: "propertyFilter.senseaudio.apiKey",
      baseUrl: "propertyFilter.senseaudio.baseUrl",
      model: "propertyFilter.senseaudio.model"
    };

      apiKey: "",
      baseUrl: "https://api.senseaudio.cn",
      model: "senseaudio-s2"
    };

    let fileAiConfig = { ...defaultAiConfig };

    function setConfigStatus() {}

    async function loadFileAiConfig() {
      try {
        const response = await fetch(`./config.json?v=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`config.json ${response.status}`);
        const config = await response.json();
        fileAiConfig = {
          apiKey: cleanApiKey(config.apiKey || config.SENSEAUDIO_API_KEY || ""),
          baseUrl: String(config.baseUrl || config.SENSEAUDIO_BASE_URL || defaultAiConfig.baseUrl).replace(/\/+$/, ""),
          model: String(config.model || config.SENSEAUDIO_MODEL || defaultAiConfig.model)
        };
        if (fileAiConfig.apiKey) {
          localStorage.setItem(aiConfigKeys.apiKey, fileAiConfig.apiKey);
          localStorage.setItem(aiConfigKeys.baseUrl, fileAiConfig.baseUrl);
          localStorage.setItem(aiConfigKeys.model, fileAiConfig.model);
          setConfigStatus("?? config.json ?? AI ?????????? AI ???");
        } else {
          setConfigStatus("config.json ??? apiKey??????????");
        }
      } catch (error) {
        setConfigStatus("???? config.json?????? API Key ???");
      }
    }

    function inputValue(el, fallback = "") {
      return el ? String(el.value || "") : fallback;
    }

    function setInputValue(el, value) {
      if (el) el.value = value;
    }

    function loadAiConfig() {
      setInputValue(els.apiKeyInput, localStorage.getItem(aiConfigKeys.apiKey) || "");
      setInputValue(els.baseUrlInput, localStorage.getItem(aiConfigKeys.baseUrl) || inputValue(els.baseUrlInput, "https://api.senseaudio.cn"));
      setInputValue(els.modelInput, localStorage.getItem(aiConfigKeys.model) || inputValue(els.modelInput, "senseaudio-s2"));
    }

    function saveAiConfig() {
      const apiKey = cleanApiKey(inputValue(els.apiKeyInput));
      const baseUrl = inputValue(els.baseUrlInput, "https://api.senseaudio.cn").trim().replace(/\/+$/, "") || "https://api.senseaudio.cn";
      const model = inputValue(els.modelInput, "senseaudio-s2").trim() || "senseaudio-s2";
      if (!apiKey) {
        appendAiMessage("assistant", "\u8bf7\u5148\u586b\u5199 SenseAudio API Key\uff0c\u518d\u53d1\u9001\u5ba2\u6237\u9700\u6c42\u3002");
        return;
      }
      localStorage.setItem(aiConfigKeys.apiKey, apiKey);
      localStorage.setItem(aiConfigKeys.baseUrl, baseUrl);
      localStorage.setItem(aiConfigKeys.model, model);
      setInputValue(els.baseUrlInput, baseUrl);
      setInputValue(els.modelInput, model);
      appendAiMessage("assistant", "AI \u63a5\u53e3\u8bbe\u7f6e\u5df2\u4fdd\u5b58\uff0c\u53ef\u4ee5\u5f00\u59cb\u8f93\u5165\u5ba2\u6237\u9700\u6c42\u3002");
    }

    function clearAiConfig() {
      localStorage.removeItem(aiConfigKeys.apiKey);
      setInputValue(els.apiKeyInput, "");
      appendAiMessage("assistant", "\u5df2\u5220\u9664\u5f53\u524d\u6d4f\u89c8\u5668\u4fdd\u5b58\u7684 API Key\u3002");
    }

    function aiEndpoint() {
      const baseUrl = (inputValue(els.baseUrlInput, fileAiConfig.baseUrl || "https://api.senseaudio.cn").trim() || "https://api.senseaudio.cn").replace(/\/+$/, "");
      return `${baseUrl}/v1/chat/completions`;
    }

    function aiSystemPrompt() {
      return [
        "\u4f60\u662f\u5c0f\u90b1AI\u52a9\u624b\uff0c\u4efb\u52a1\u662f\u6839\u636e\u5ba2\u6237\u81ea\u7136\u8bed\u8a00\u9700\u6c42\u7b5b\u9009\u623f\u6e90\u3002",
        "\u53ea\u80fd\u8fd4\u56de\u4e25\u683c JSON\uff0c\u4e0d\u8981\u4f7f\u7528 Markdown\uff0c\u4e0d\u8981\u6dfb\u52a0\u591a\u4f59\u89e3\u91ca\u3002",
        "JSON \u683c\u5f0f\uff1a{\\\"filters\\\":{\\\"community\\\":\\\"\\\",\\\"rooms\\\":\\\"\\\",\\\"halls\\\":\\\"\\\",\\\"bathrooms\\\":\\\"\\\",\\\"areaRange\\\":\\\"\\\",\\\"floor\\\":\\\"\\\",\\\"direction\\\":\\\"\\\",\\\"decoration\\\":\\\"\\\",\\\"yearRange\\\":\\\"\\\",\\\"surroundings\\\":[]},\\\"reply\\\":\\\"\u7ed9\u5ba2\u6237\u770b\u7684\u4e2d\u6587\u56de\u590d\\\"}",
        "\u5b57\u6bb5\u53d6\u503c\u5fc5\u987b\u6765\u81ea\u623f\u6e90\u6570\u636e\u548c\u7b5b\u9009\u9879\u3002\u672a\u77e5\u6761\u4ef6\u7559\u7a7a\u3002rooms\u3001halls\u3001bathrooms \u7528\u6570\u5b57\u5b57\u7b26\u4e32\u3002surroundings \u53ea\u80fd\u5305\u542b \u5b66\u6821\u3001\u533b\u9662\u3001\u516c\u56ed\u3002",
        "\u5982\u679c\u5ba2\u6237\u95ee\u5019\u6216\u9700\u6c42\u4e0d\u660e\u786e\uff0c\u4e5f\u8981\u7ed9\u51fa\u7b80\u77ed\u4e2d\u6587\u56de\u590d\uff0c\u5e76\u8fd4\u56de\u5c3d\u91cf\u5c11\u7684\u7b5b\u9009\u6761\u4ef6\u3002"
      ].join("\n");
    }

    function parseAiJson(content) {
      const text = String(content || "").trim();
      try { return JSON.parse(text); } catch (error) {}
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error("AI \u8fd4\u56de\u5185\u5bb9\u4e0d\u662f\u53ef\u89e3\u6790\u7684 JSON");
      return JSON.parse(match[0]);
    }

    function cleanApiKey(value) {
      return String(value || "").trim().replace(/^Bearer\s+/i, "").replace(/^['"]|['"]$/g, "");
    }

    function apiErrorMessage(data, status) {
      const code = data.code || data.error?.code || "";
      const message = data.message || data.error?.message || data.error || "";
      return [code, message || `AI API \u8bf7\u6c42\u5931\u8d25\uff1a${status}`].filter(Boolean).join("\uff1a");
    }

    async function requestSenseAudio(messages, options = {}) {
      const apiKey = cleanApiKey(inputValue(els.apiKeyInput) || localStorage.getItem(aiConfigKeys.apiKey) || fileAiConfig.apiKey);
      const model = inputValue(els.modelInput, fileAiConfig.model || "senseaudio-s2").trim() || "senseaudio-s2";
      if (!apiKey) throw new Error("AI \u914d\u7f6e\u672a\u751f\u6548\uff0c\u8bf7\u68c0\u67e5 config.json \u4e2d\u7684 apiKey");

      const response = await fetch(aiEndpoint(), {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({ model, temperature: options.temperature ?? 0.2, messages })
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(apiErrorMessage(data, response.status));
      return data;
    }

    async function testAiConnection() {
      if (els.testApiKey) {
        els.testApiKey.disabled = true;
        els.testApiKey.textContent = "\u6d4b\u8bd5\u4e2d...";
      }
      try {
        await requestSenseAudio([{ role: "user", content: "\u8bf7\u53ea\u56de\u590d OK" }], { temperature: 0 });
        appendAiMessage("assistant", "AI \u8fde\u63a5\u6d4b\u8bd5\u6210\u529f\uff0c\u5f53\u524d Key \u548c\u6a21\u578b\u53ef\u4ee5\u4f7f\u7528\u3002");
      } catch (error) {
        appendAiMessage("assistant", `AI \u8fde\u63a5\u6d4b\u8bd5\u5931\u8d25\uff1a${error.message || error}`);
      } finally {
        if (els.testApiKey) {
          els.testApiKey.disabled = false;
          els.testApiKey.textContent = "\u6d4b\u8bd5\u8fde\u63a5";
        }
      }
    }

    async function getAiMatch(query) {
      const data = await requestSenseAudio([
        { role: "system", content: aiSystemPrompt() },
        { role: "user", content: JSON.stringify({ query, listings }) }
      ]);
      const content = data.choices?.[0]?.message?.content || data.content || "";
      return parseAiJson(content);
    }

    async function handleAiSubmit(text) {
      const query = text.trim();
      if (!query) return;
      appendAiMessage("user", query);
      els.aiInput.value = "";
      const loadingNode = appendAiMessage("assistant", aiText.loading);

      try {
        const aiResult = await getAiMatch(query);
        if (aiResult.filters) applyAiFilters(aiResult.filters);
        if (window.innerWidth < 1180) {
          els.resultsPanel.scrollIntoView({ behavior: "smooth", block: "start" });
        }
        loadingNode.textContent = aiResult.reply || aiResult.content || aiText.defaultReply;
      } catch (error) {
        loadingNode.textContent = error.message || aiText.failed;
      }
    }

    function selectedSurroundings() {
      return els.surroundingChecks
        .filter((input) => input.checked)
        .map((input) => input.value);
    }

    function applyFilters() {
      const filters = {
        community: els.community.value,
        rooms: els.rooms.value,
        halls: els.halls.value,
        bathrooms: els.bathrooms.value,
        areaRange: els.areaRange.value,
        floor: els.floor.value,
        direction: els.direction.value,
        decoration: els.decoration.value,
        yearRange: els.yearRange.value,
        surroundings: selectedSurroundings()
      };

      state.filtered = listings.filter((item) => {
        const basicMatch =
          (!filters.community || item.community === filters.community) &&
          (!filters.rooms || String(item.rooms) === filters.rooms) &&
          (!filters.halls || String(item.halls) === filters.halls) &&
          (!filters.bathrooms || String(item.bathrooms) === filters.bathrooms) &&
          (!filters.areaRange || item.areaRange === filters.areaRange) &&
          (!filters.floor || item.floor === filters.floor) &&
          (!filters.direction || item.direction === filters.direction) &&
          (!filters.decoration || item.decoration === filters.decoration) &&
          (!filters.yearRange || item.yearRange === filters.yearRange);

        const surroundingsMatch = filters.surroundings.length === 0 ||
          filters.surroundings.every((tag) => item.surroundings.includes(tag));

        return basicMatch && surroundingsMatch;
      });

      render();
      if (window.innerWidth < 1180) {
        els.resultsPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function resetFilters() {
      [
        els.community,
        els.rooms,
        els.halls,
        els.bathrooms,
        els.areaRange,
        els.floor,
        els.direction,
        els.decoration,
        els.yearRange
      ].forEach((select) => {
        select.value = "";
      });

      els.surroundingChecks.forEach((input) => {
        input.checked = false;
      });

      applyFilters();
    }

    function renderCards() {
      els.cards.innerHTML = state.filtered.map((item) => {
        const tags = item.surroundings.map((tag) => `<span class="tag">${tag}</span>`).join("");

        return `
          <button class="card" type="button" data-index="${listings.indexOf(item)}" aria-label="查看${item.community}房源视频">
            <div class="card-top">
              <div>
                <h3 class="community">${item.community}</h3>
                <p class="meta">${item.rooms}房${item.halls}厅${item.bathrooms}卫 · ${item.year}年建成</p>
              </div>
              <div class="area">${item.area}㎡</div>
            </div>

            <div class="facts">
              <div class="fact"><span>面积</span><strong>${item.area}㎡</strong></div>
              <div class="fact"><span>楼层</span><strong>${item.floor}</strong></div>
              <div class="fact"><span>朝向</span><strong>${item.direction}</strong></div>
              <div class="fact"><span>装修</span><strong>${item.decoration}</strong></div>
              <div class="fact"><span>建成年代</span><strong>${item.year}年</strong></div>
              <div class="fact"><span>房型</span><strong>${item.rooms}房${item.halls}厅${item.bathrooms}卫</strong></div>
            </div>

            <div class="tags">${tags}</div>

            <div class="card-footer">
              <span>小邱推荐房源</span>
              <span class="open-link">查看视频</span>
            </div>
          </button>
        `;
      }).join("");

      Array.from(els.cards.querySelectorAll(".card")).forEach((card) => {
        card.addEventListener("click", () => {
          const listing = listings[Number(card.dataset.index)];
          window.open(listing.videoLink, "_blank", "noopener");
        });
      });
    }

    function renderSummary() {
      if (els.totalCount) els.totalCount.textContent = listings.length;
      if (els.matchCount) els.matchCount.textContent = state.filtered.length;
      els.resultText.textContent = state.filtered.length > 0
        ? `当前为您匹配到 ${state.filtered.length} 套房源`
        : "当前没有完全符合条件的房源";

      if (state.filtered.length === 0) {
        els.avgArea.textContent = "—";
        els.mainFit.textContent = "—";
        return;
      }

      const avg = state.filtered.reduce((sum, item) => sum + item.area, 0) / state.filtered.length;
      const layoutCounts = state.filtered.reduce((acc, item) => {
        const key = `${item.rooms}房${item.halls}厅`;
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
      const mainFit = Object.entries(layoutCounts).sort((a, b) => b[1] - a[1])[0][0];

      els.avgArea.textContent = `${avg.toFixed(1)}㎡`;
      els.mainFit.textContent = mainFit;
    }

    function render() {
      renderSummary();
      renderCards();

      const hasResults = state.filtered.length > 0;
      els.cards.style.display = hasResults ? "grid" : "none";
      els.emptyState.style.display = hasResults ? "none" : "block";
    }

    function openModal(listing) {
      state.activeVideo = listing.videoLink;
      els.modalTitle.textContent = `${listing.community} 房源视频`;
      els.modalSubtitle.textContent = `${listing.rooms}房${listing.halls}厅${listing.bathrooms}卫 · ${listing.area}㎡ · ${listing.floor} · ${listing.decoration}`;
      els.videoLink.textContent = listing.videoLink;
      els.openVideo.href = listing.videoLink;
      els.modalBackdrop.classList.add("open");
      els.closeModal.focus();
    }

    function closeModal() {
      els.modalBackdrop.classList.remove("open");
    }

    async function copyActiveVideo() {
      if (!state.activeVideo) return;

      try {
        await navigator.clipboard.writeText(state.activeVideo);
        showToast("已复制视频链接");
      } catch (error) {
        showToast("复制失败，请手动复制");
      }
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      window.setTimeout(() => {
        els.toast.classList.remove("show");
      }, 1800);
    }

    if (els.filterBtn) els.filterBtn.addEventListener("click", applyFilters);
    if (els.resetBtn) els.resetBtn.addEventListener("click", resetFilters);

    if (els.aiForm) els.aiForm.addEventListener("submit", (event) => {
      event.preventDefault();
      handleAiSubmit(inputValue(els.aiInput));
    });

    if (els.aiInput) els.aiInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        handleAiSubmit(inputValue(els.aiInput));
      }
    });

    if (els.aiClear) els.aiClear.addEventListener("click", () => {
      resetFilters();
      appendAiMessage("assistant", aiText.cleared);
    });

    [
      els.community,
      els.rooms,
      els.halls,
      els.bathrooms,
      els.areaRange,
      els.floor,
      els.direction,
      els.decoration,
      els.yearRange
    ].filter(Boolean).forEach((select) => {
      select.addEventListener("change", applyFilters);
    });

    els.surroundingChecks.forEach((input) => {
      input.addEventListener("change", applyFilters);
    });

    if (els.closeModal) els.closeModal.addEventListener("click", closeModal);
    if (els.copyVideo) els.copyVideo.addEventListener("click", copyActiveVideo);

    if (els.modalBackdrop) els.modalBackdrop.addEventListener("click", (event) => {
      if (event.target === els.modalBackdrop) closeModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    function setMobileView(view) {
      const normalized = view === "filter" ? "filter" : "ai";
      document.body.classList.toggle("mobile-view-ai", normalized === "ai");
      document.body.classList.toggle("mobile-view-filter", normalized === "filter");
      document.querySelectorAll("[data-mobile-tab]").forEach((button) => {
        button.classList.toggle("active", button.dataset.mobileTab === normalized);
      });
    }

    document.querySelectorAll("[data-mobile-tab]").forEach((button) => {
      button.addEventListener("click", () => setMobileView(button.dataset.mobileTab));
    });

    setMobileView("ai");

    loadAiConfig();
    loadFileAiConfig();

    render();
  </script>
</body>
</html>
